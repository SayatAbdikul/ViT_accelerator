[pytest]
testpaths = tests
# A test marked with a name not in this list raises an error under
# --strict-markers, so adding a new marker means registering it here first.
markers =
    slow: takes more than ~30s; excluded from PR CI via -m "not slow"
    integration: spawns Verilator/cocotb subprocess; needs RTL build
    requires_assets: needs software/pytorch_model.bin or software/images/
        (both gitignored); auto-skipped by conftest when missing

# 5-minute per-test budget — a few RTL integration tests legitimately take
# minutes; anything longer is hung. The native Verilator suite is exercised
# outside pytest (make -C rtl/verilator). pytest-timeout is listed in
# requirements.txt so a fresh venv picks it up automatically.
timeout = 300

# Tighten marker hygiene so unregistered markers fail the run.
filterwarnings =
    ignore::DeprecationWarning:transformers.*
    ignore::DeprecationWarning:torch.*
